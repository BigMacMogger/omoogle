<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
    }

    video {
      width: 100%;
      border-radius: 14px;
      margin-top: 10px;
      transform: scaleX(-1);
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      background: #00ff88;
      color: black;
    }

    #game {
      display: none;
    }

    .rank {
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>

<body>

<!-- ================= FACE CHECK SCREEN ================= -->
<div class="container" id="faceScreen">

  <div class="title">OMOOGLE FACE CHECK</div>

  <div class="box">
    <div>Look at camera</div>
    <video id="video" autoplay playsinline></video>
  </div>

  <button onclick="enterGame()">ENTER GAME</button>

</div>

<!-- ================= GAME SCREEN ================= -->
<div class="container" id="game">

  <div class="title">OMOOGLE</div>

  <div class="box">
    <div>Your ELO</div>
    <div id="elo" style="font-size:40px;font-weight:900;">1000</div>
    <div class="rank" id="rank">Fed</div>
  </div>

  <button onclick="findMatch()">FIND MATCH</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let stream = null;
let elo = 1000;

/* ================= CAMERA START ================= */
async function startCamera() {
  let video = document.getElementById("video");

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: false
  });

  video.srcObject = stream;
}

/* start instantly */
startCamera();

/* ================= ENTER GAME ================= */
function enterGame() {
  document.getElementById("faceScreen").style.display = "none";
  document.getElementById("game").style.display = "block";
}

/* ================= RANK SYSTEM ================= */
function updateRank() {
  let rank = "";

  if (elo < 1000) rank = "🧼 Fed";
  else if (elo < 1200) rank = "😐 Discord Mod";
  else if (elo < 1400) rank = "🧍 NPC";
  else if (elo < 1600) rank = "🏋️ Gym Bro";
  else if (elo < 1800) rank = "📈 Looksmaxxer";
  else if (elo < 2000) rank = "😎 Mogger";
  else rank = "🔥 Gigachad";

  document.getElementById("rank").innerText = rank;
}

/* ================= MATCH ================= */
function findMatch() {

  let win = Math.random() > 0.5;

  elo += win ? 25 : -15;
  if (elo < 100) elo = 100;

  document.getElementById("elo").innerText = elo;

  updateRank();

  alert(win ? "YOU WON" : "YOU LOST");
}

updateRank();
</script>

</body>
</html>
