<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    .rating {
      font-size: 42px;
      font-weight: 900;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      background: #00ff88;
      color: black;
    }

    .login {
      background: #4285F4;
      color: white;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    #game {
      display: none;
    }

    .small {
      color: #aaa;
      font-size: 13px;
    }

    #countdown {
      font-size: 60px;
      font-weight: 900;
      margin-top: 10px;
    }

    .rankBar {
      margin-top: 15px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
      white-space: nowrap;
    }

    .rankTrack {
      display: inline-block;
      animation: scroll 12s linear infinite;
    }

    .rank {
      display: inline-block;
      margin-right: 20px;
      opacity: 0.8;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <!-- LOGIN -->
  <div id="loginBox">
    <button class="login" onclick="login()">SIGN IN WITH GOOGLE</button>
  </div>

  <!-- FACE CHECK -->
  <div id="faceCheck" style="display:none;">
    <div class="small">Face Check</div>
    <video id="video" autoplay playsinline></video>
    <button onclick="enterGame()">ENTER GAME</button>
  </div>

  <!-- GAME -->
  <div id="game">

    <div class="small" id="userInfo"></div>

    <div class="card">
      <div>Your ELO</div>
      <div class="rating" id="elo">1000</div>
      <div id="stats">Wins: 0 | Losses: 0</div>
    </div>

    <!-- ANIMATED RANK BAR -->
    <div class="rankBar">
      <div class="rankTrack">
        <span class="rank">🧼 Fed</span>
        <span class="rank">😐 Mod</span>
        <span class="rank">🧍 NPC</span>
        <span class="rank">🏋️ Gym Bro</span>
        <span class="rank">📈 Looksmaxxer</span>
        <span class="rank">😎 Mogger</span>
        <span class="rank">🔥 Gigachad</span>
        <span class="rank">⚡ Aura Farmer</span>

        <span class="rank">🧼 Fed</span>
        <span class="rank">😐 Mod</span>
      </div>
    </div>

    <button onclick="findMatch()">FIND MATCH</button>

    <div id="countdown"></div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let elo = 1000;
let wins = 0;
let losses = 0;
let stream = null;

/* ================= GOOGLE LOGIN FIX ================= */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

/* handle redirect result */
auth.getRedirectResult().then(result => {
  if (result.user) {
    user = result.user;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("faceCheck").style.display = "block";

    document.getElementById("userInfo").innerText =
      "Logged in as: " + user.displayName;

    loadData();
    startCamera();
  }
});

/* ================= CAMERA ================= */
async function startCamera() {
  let video = document.getElementById("video");

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: false
  });

  video.srcObject = stream;
}

function enterGame() {
  document.getElementById("faceCheck").style.display = "none";
  document.getElementById("game").style.display = "block";
}

/* ================= DATA ================= */
function loadData() {
  db.ref("users/" + user.uid).on("value", snap => {
    let d = snap.val();

    if (d) {
      elo = d.elo || 1000;
      wins = d.wins || 0;
      losses = d.losses || 0;
    }

    updateUI();
  });
}

function saveData() {
  db.ref("users/" + user.uid).set({
    elo,
    wins,
    losses,
    name: user.displayName
  });
}

/* ================= UI ================= */
function updateUI() {
  document.getElementById("elo").innerText = elo;
  document.getElementById("stats").innerText =
    "Wins: " + wins + " | Losses: " + losses;
}

/* ================= MATCH ================= */
function findMatch() {

  let win = Math.random() > 0.5;

  if (win) {
    elo += 25;
    wins++;
  } else {
    elo -= 15;
    losses++;
  }

  if (elo < 100) elo = 100;

  saveData();
  updateUI();

  document.getElementById("countdown").innerText =
    win ? "YOU WON" : "YOU LOST";
}
</script>

</body>
</html>
