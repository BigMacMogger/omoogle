<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --card: #15151d;
      --card2: #1c1c26;
      --text: #ffffff;
      --muted: #9a9aa5;
      --accent: #00ff88;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      padding: 22px;
      padding-bottom: 90px;
      max-width: 500px;
      margin: auto;
    }

    .top {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .card {
      background: linear-gradient(145deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 18px;
      margin-top: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .rating {
      font-size: 34px;
      font-weight: 800;
      margin-top: 6px;
    }

    .rank {
      margin-top: 6px;
      color: var(--accent);
      font-weight: 600;
      font-size: 16px;
    }

    .button {
      margin-top: 25px;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      color: #000;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }

    .button:active {
      transform: scale(0.98);
    }

    .bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,15,20,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .tab {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .tab:hover {
      color: var(--text);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top">OMOOGLE</div>
    <div class="sub">1v1 aura-based battles</div>

    <div class="card">
      <div class="label">YOUR RATING</div>
      <div class="rating">57</div>
      <div class="rank">Looksmaxxer</div>
    </div>

    <button class="button">FIND MATCH</button>

  </div>

  <div class="bottom">
    <div class="tab">Leaderboard</div>
    <div class="tab">Profile</div>
    <div class="tab">History</div>
    <div class="tab">Settings</div>
  </div>

</body>
</html>
