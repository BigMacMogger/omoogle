<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --card: rgba(25, 25, 35, 0.75);
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: #9aa0a6;
      --accent: #00ff88;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 60%);
      top: -150px;
      left: -150px;
      filter: blur(40px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 22px;
      padding-bottom: 90px;
      max-width: 500px;
      margin: auto;
    }

    .top {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-top: 10px;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .card {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.03) inset;
      backdrop-filter: blur(12px);
      transition: 0.2s ease;
    }

    .card:active {
      transform: translateY(2px);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .rating {
      font-size: 38px;
      font-weight: 900;
      margin-top: 6px;
    }

    .rank {
      margin-top: 6px;
      color: var(--accent);
      font-weight: 600;
    }

    .button {
      margin-top: 22px;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      color: #000;
      box-shadow: 0 0 25px rgba(0,255,136,0.15);
    }

    .button:active {
      transform: scale(0.98);
    }

    .scroll {
      margin-top: 18px;
      overflow: hidden;
      white-space: nowrap;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .track {
      display: inline-block;
      padding: 10px;
      animation: scroll 12s linear infinite;
    }

    .badge {
      display: inline-block;
      margin-right: 20px;
      font-size: 12px;
      color: var(--muted);
    }

    .badge b {
      color: var(--text);
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,15,20,0.6);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .tab {
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top">OMOOGLE</div>
    <div class="sub">1v1 aura-based battles</div>

    <div class="card">
      <div class="label">YOUR RATING</div>
      <div class="rating">57</div>
      <div class="rank">Looksmaxxer</div>
    </div>

    <button class="button">FIND MATCH</button>

    <!-- LIVE ACTIVITY BAR -->
    <div class="scroll">
      <div class="track">
        <span class="badge">🔥 <b>AuraFarmer</b> beat Gigachad (+24)</span>
        <span class="badge">⚡ <b>MogKing</b> hit 91 rating</span>
        <span class="badge">👑 <b>NPCSlayer</b> ranked up to Redditor</span>
        <span class="badge">💀 <b>FedBoy</b> got destroyed (-18)</span>
      </div>
    </div>

  </div>

  <div class="bottom">
    <div class="tab">Leaderboard</div>
    <div class="tab">Profile</div>
    <div class="tab">History</div>
    <div class="tab">Settings</div>
  </div>

</body>
</html>
