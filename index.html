<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Omoogle</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --card: rgba(25, 25, 35, 0.75);
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: #9aa0a6;
      --accent: #00ff88;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 22px;
      max-width: 500px;
      margin: auto;
    }

    .top {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .card {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .rating {
      font-size: 40px;
      font-weight: 900;
      margin-top: 10px;
    }

    .rank {
      color: var(--accent);
      margin-top: 5px;
      font-weight: 600;
    }

    .button {
      margin-top: 22px;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      color: #000;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }

    .resultBox {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      display: none;
    }

    .win { color: #00ff88; font-weight: 800; }
    .lose { color: #ff4d4d; font-weight: 800; }
  </style>
</head>

<body>

<div class="container">

  <div class="top">OMOOGLE</div>
  <div class="sub">1v1 aura battles</div>

  <div class="card">
    <div>Your Rating</div>
    <div class="rating" id="rating">57</div>
    <div class="rank" id="rank">Looksmaxxer</div>
  </div>

  <button class="button" onclick="findMatch()">FIND MATCH</button>

  <div class="status" id="status"></div>

  <div class="resultBox" id="resultBox">
    <div id="resultText"></div>
  </div>

</div>

<script>
let rating = 57;

function getRank(r) {
  if (r >= 91) return "Final Boss";
  if (r >= 81) return "Aura Farmer";
  if (r >= 71) return "Gigachad";
  if (r >= 61) return "Mogger";
  if (r >= 51) return "Looksmaxxer";
  if (r >= 41) return "Gym Bro";
  if (r >= 31) return "Redditor";
  if (r >= 21) return "NPC";
  if (r >= 11) return "Discord Mod";
  return "Fed";
}

function findMatch() {
  document.getElementById("status").innerText = "Searching for opponent...";

  document.getElementById("resultBox").style.display = "none";

  setTimeout(() => {

    // opponent + aura generation (1–100)
    let youAura = Math.floor(Math.random() * 100) + 1;
    let oppAura = Math.floor(Math.random() * 100) + 1;

    let win = youAura >= oppAura;

    let change = win ? Math.floor(Math.random() * 25) + 10 : -(Math.floor(Math.random() * 20) + 5);
    rating += change;

    if (rating < 1) rating = 1;
    if (rating > 100) rating = 100;

    document.getElementById("rating").innerText = rating;
    document.getElementById("rank").innerText = getRank(rating);

    document.getElementById("status").innerText = "";

    document.getElementById("resultBox").style.display = "block";

    document.getElementById("resultText").innerHTML =
      (win ? "<span class='win'>YOU WON</span>" : "<span class='lose'>YOU LOST</span>") +
      "<br><br>You Aura: " + youAura +
      "<br>Opponent Aura: " + oppAura +
      "<br><br>Change: " + change +
      "<br>New Rating: " + rating;

  }, 2000 + Math.random() * 2000);
}
</script>

</body>
</html>
