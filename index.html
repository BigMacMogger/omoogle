<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Omoogle Multiplayer</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      margin-top: 10px;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .rating {
      font-size: 40px;
      font-weight: 900;
      margin-top: 10px;
    }

    .button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      background: #00ff88;
      color: black;
    }

    .status {
      margin-top: 15px;
      color: #9aa0a6;
    }

    .match {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div class="card">
    <div>Your Rating</div>
    <div class="rating" id="rating">1000</div>
    <div id="rank">Fed</div>
  </div>

  <button class="button" onclick="findMatch()">FIND MATCH</button>

  <div class="status" id="status"></div>

  <div class="match" id="matchBox">
    <div id="matchText"></div>
  </div>

</div>

<!-- ================= FIREBASE (COPY PASTE READY) ================= -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= GAME DATA ================= */

let playerId = "p_" + Math.random().toString(36).substr(2, 9);
let rating = 1000;

/* ================= FIND MATCH ================= */

function findMatch() {
  document.getElementById("status").innerText = "Searching for opponent...";

  document.getElementById("matchBox").style.display = "none";

  // join queue
  db.ref("queue/" + playerId).set({
    rating: rating,
    time: Date.now()
  });

  // listen for match
  db.ref("matches").on("value", snap => {
    let data = snap.val();
    if (!data) return;

    for (let id in data) {
      let match = data[id];

      if (match.p1 === playerId || match.p2 === playerId) {
        startMatch(match);
      }
    }
  });
}

/* ================= START MATCH ================= */

function startMatch(match) {
  document.getElementById("status").innerText = "Match found!";

  document.getElementById("matchBox").style.display = "block";

  let youAura = Math.floor(Math.random() * 100);
  let oppAura = Math.floor(Math.random() * 100);

  let win = youAura >= oppAura;

  if (win) rating += 25;
  else rating -= 15;

  if (rating < 100) rating = 100;

  document.getElementById("rating").innerText = rating;

  document.getElementById("matchText").innerHTML =
    "You Aura: " + youAura +
    "<br>Opponent Aura: " + oppAura +
    "<br><br>" + (win ? "YOU WON" : "YOU LOST");
}
</script>

</body>
</html>
