<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
    }

    .rating {
      font-size: 40px;
      font-weight: 900;
    }

    .button {
      margin-top: 15px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      background: #00ff88;
      color: black;
    }

    #countdown {
      font-size: 60px;
      font-weight: 900;
      margin-top: 10px;
    }

    .match {
      margin-top: 20px;
      display: none;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    .players {
      color: #9aa0a6;
      margin-top: 10px;
    }

    input {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div class="players" id="players">Active Players: 0</div>

  <div class="card">
    <div>Your Rating</div>
    <div class="rating" id="rating">1000</div>
  </div>

  <button class="button" onclick="findMatch()">FIND MATCH</button>

  <input type="file" accept="image/*" capture="user" id="camera">

  <div id="countdown"></div>

  <div class="match" id="matchBox">
    <div id="matchText"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = "p_" + Math.random().toString(36).substr(2, 9);
let rating = 1000;
let imageData = null;
let matched = false;

/* ONLINE */
db.ref("online/" + playerId).set({time:Date.now()});
db.ref("online/" + playerId).onDisconnect().remove();

db.ref("online").on("value", snap => {
  let d = snap.val();
  document.getElementById("players").innerText =
    "Active Players: " + (d ? Object.keys(d).length : 0);
});

/* CAMERA */
document.getElementById("camera").addEventListener("change", e => {
  let file = e.target.files[0];
  if (!file) return;

  let reader = new FileReader();
  reader.onload = ev => {
    imageData = ev.target.result;
  };
  reader.readAsDataURL(file);
});

/* FIND MATCH */
function findMatch() {
  db.ref("queue/" + playerId).set({
    rating: rating,
    time: Date.now()
  });

  db.ref("queue/" + playerId).onDisconnect().remove();

  matchmaker();
}

/* AUTO MATCHMAKER (THIS WAS MISSING) */
function matchmaker() {
  db.ref("queue").once("value", snap => {
    let q = snap.val();
    if (!q) return;

    let players = Object.keys(q);

    if (players.length < 2) return;

    let p1 = players[0];
    let p2 = players[1];

    let matchId = "m_" + Date.now();

    db.ref("matches/" + matchId).set({
      p1, p2
    });

    db.ref("queue/" + p1).remove();
    db.ref("queue/" + p2).remove();
  });

  listenForMatch();
}

/* LISTEN */
function listenForMatch() {
  db.ref("matches").on("value", snap => {
    let data = snap.val();
    if (!data) return;

    for (let id in data) {
      let m = data[id];

      if ((m.p1 === playerId || m.p2 === playerId) && !matched) {
        matched = true;
        countdown(m);
      }
    }
  });
}

/* COUNTDOWN */
function countdown(match) {
  let c = 3;

  let t = setInterval(() => {
    document.getElementById("countdown").innerText = c;

    c--;

    if (c < 0) {
      clearInterval(t);
      start(match);
    }
  }, 1000);
}

/* MATCH */
function start(match) {

  let youAura = imageData ? Math.floor(Math.random()*40+60) : Math.floor(Math.random()*100);
  let oppAura = Math.floor(Math.random()*100);

  let win = youAura >= oppAura;

  if (win) rating += 25;
  else rating -= 15;

  document.getElementById("rating").innerText = rating;

  document.getElementById("matchBox").style.display = "block";

  document.getElementById("matchText").innerHTML =
    "You Aura: " + youAura +
    "<br>Opponent Aura: " + oppAura +
    "<br><br>" + (win ? "YOU WON" : "YOU LOST");

  matched = false;
}
</script>

</body>
</html>
