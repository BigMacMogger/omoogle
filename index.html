<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      margin-top: 10px;
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    .rating {
      font-size: 42px;
      font-weight: 900;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      background: #00ff88;
      color: black;
    }

    .login {
      background: #4285F4;
      color: white;
    }

    .small {
      color: #aaa;
      font-size: 13px;
    }

    /* ================= RANK BAR ================= */

    .rankBox {
      margin-top: 15px;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
    }

    .rankTrack {
      display: flex;
      gap: 10px;
      animation: scroll 10s linear infinite;
      width: max-content;
    }

    .rank {
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      font-weight: 700;
      white-space: nowrap;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div id="loginBox">
    <button class="login" onclick="login()">SIGN IN WITH GOOGLE</button>
  </div>

  <div id="game" style="display:none;">

    <div class="small" id="userInfo"></div>

    <div class="card">
      <div>Your ELO</div>
      <div class="rating" id="elo">1000</div>
      <div id="stats">Wins: 0 | Losses: 0</div>
    </div>

    <!-- 🔥 ANIMATED RANK BAR -->
    <div class="rankBox">
      <div class="rankTrack">
        <div class="rank">🧼 Fed (0–999)</div>
        <div class="rank">😐 Discord Mod (1000–1199)</div>
        <div class="rank">🧍 NPC (1200–1399)</div>
        <div class="rank">🏋️ Gym Bro (1400–1599)</div>
        <div class="rank">📈 Looksmaxxer (1600–1799)</div>
        <div class="rank">😎 Mogger (1800–1999)</div>
        <div class="rank">🔥 Gigachad (2000–2199)</div>
        <div class="rank">⚡ Aura Farmer (2200+)</div>

        <!-- duplicate for smooth loop -->
        <div class="rank">🧼 Fed (0–999)</div>
        <div class="rank">😐 Discord Mod (1000–1199)</div>
      </div>
    </div>

    <button onclick="findMatch()">FIND MATCH</button>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let elo = 1000;
let wins = 0;
let losses = 0;

/* LOGIN */
function login() {
  let provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(res => {
    user = res.user;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("game").style.display = "block";

    document.getElementById("userInfo").innerText =
      "Logged in as: " + user.displayName;

    loadData();
  });
}

/* LOAD */
function loadData() {
  db.ref("users/" + user.uid).on("value", snap => {
    let d = snap.val();

    if (d) {
      elo = d.elo || 1000;
      wins = d.wins || 0;
      losses = d.losses || 0;
    }

    updateUI();
  });
}

/* SAVE */
function saveData() {
  db.ref("users/" + user.uid).set({
    elo, wins, losses,
    name: user.displayName
  });
}

/* UI */
function updateUI() {
  document.getElementById("elo").innerText = elo;
  document.getElementById("stats").innerText =
    "Wins: " + wins + " | Losses: " + losses;
}

/* MATCH */
function findMatch() {

  let win = Math.random() > 0.5;

  if (win) {
    elo += 25;
    wins++;
  } else {
    elo -= 15;
    losses++;
  }

  if (elo < 100) elo = 100;

  saveData();
  updateUI();

  alert(win ? "YOU WON" : "YOU LOST");
}
</script>

</body>
</html>
