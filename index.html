<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .top {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .card {
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
    }

    .rating {
      font-size: 22px;
      margin-top: 10px;
    }

    .rank {
      color: #00ff88;
      margin-top: 5px;
    }

    .button {
      margin-top: 30px;
      padding: 15px;
      width: 80%;
      background: #00ff88;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #111;
    }

    .tab {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="top">OMOOGLE</div>

  <div class="card">
    <div>YOUR PROFILE</div>
    <div class="rating">Rating: 57</div>
    <div class="rank">Looksmaxxer</div>
  </div>

  <button class="button">FIND MATCH</button>

  <div class="bottom">
    <div class="tab">Leaderboard</div>
    <div class="tab">Profile</div>
    <div class="tab">History</div>
    <div class="tab">Settings</div>
  </div>

</body>
</html>
