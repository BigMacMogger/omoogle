<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 32px;
      font-weight: 900;
      margin-top: 10px;
    }

    video {
      width: 100%;
      border-radius: 14px;
      margin-top: 10px;
      transform: scaleX(-1);
    }

    .card {
      margin-top: 15px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      background: #00ff88;
      color: black;
    }

    #matchStatus {
      margin-top: 15px;
      font-size: 18px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div class="card">
    👥 Online Players: <span id="online">0</span>
  </div>

  <video id="video" autoplay playsinline></video>

  <button onclick="joinQueue()">FIND MATCH</button>

  <div id="matchStatus">Not in queue</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER ID ================= */
let userId = "u_" + Math.random().toString(36).substring(2, 10);

/* ================= CAMERA ================= */
async function startCamera() {
  let video = document.getElementById("video");

  let stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: false
  });

  video.srcObject = stream;
}

startCamera();

/* ================= ONLINE SYSTEM ================= */
db.ref("online/" + userId).set({
  time: Date.now()
});

db.ref("online/" + userId).onDisconnect().remove();

/* live counter */
db.ref("online").on("value", snap => {
  let data = snap.val();
  let count = data ? Object.keys(data).length : 0;
  document.getElementById("online").innerText = count;
});

/* ================= MATCHMAKING ================= */
function joinQueue() {

  document.getElementById("matchStatus").innerText = "Searching for match...";

  db.ref("queue/" + userId).set({
    time: Date.now()
  });

  db.ref("queue/" + userId).onDisconnect().remove();

  checkMatch();
}

/* simple matcher loop */
function checkMatch() {

  setInterval(() => {

    db.ref("queue").once("value", snap => {
      let q = snap.val();
      if (!q) return;

      let players = Object.keys(q);

      if (players.length >= 2) {

        let p1 = players[0];
        let p2 = players[1];

        let matchId = "m_" + Date.now();

        db.ref("matches/" + matchId).set({
          p1, p2,
          state: "started"
        });

        db.ref("queue/" + p1).remove();
        db.ref("queue/" + p2).remove();

        document.getElementById("matchStatus").innerText =
          "MATCH FOUND: " + matchId;
      }
    });

  }, 2000);
}
</script>

</body>
</html>
