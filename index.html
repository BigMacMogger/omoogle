<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen">

    <h1 class="logo">OMOOGLE</h1>

    <p class="subtitle">
      Rate. Mog. Climb.
    </p>

    <button id="googleLoginBtn" class="mainButton">
      Sign in with Google
    </button>

  </div>

  <!-- USERNAME SCREEN -->
  <div id="usernameScreen" class="screen hidden">

    <h1 class="logo">WELCOME TO OMOOGLE</h1>

    <p class="subtitle">
      Choose Your Identity
    </p>

    <input
      id="usernameInput"
      type="text"
      maxlength="13"
      placeholder="Username"
    >

    <p id="usernameStatus"></p>

    <button id="createUsernameBtn" class="mainButton">
      Continue
    </button>

  </div>

  <!-- MAIN MENU -->
  <div id="mainMenu" class="screen hidden">

    <h1 class="logo">OMOOGLE</h1>

    <div class="card">
      <div id="profileUsername">Loading...</div>
      <div id="profileRank">Fed</div>
      <div id="profileElo">1000 ELO</div>
    </div>

    <div class="card">
      👥 Online:
      <span id="onlineCount">0</span>
    </div>

    <button id="findMatchBtn" class="mainButton">
      FIND MATCH
    </button>

    <button id="profileBtn" class="secondaryButton">
      PROFILE
    </button>

  </div>

  <!-- LOAD SCRIPTS -->
  <script src="firebase.js"></script>
  <script src="script.js"></script>

</body>
</html>
