<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .rating {
      font-size: 42px;
      font-weight: 900;
      margin-top: 10px;
    }

    .button {
      margin-top: 18px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      background: #00ff88;
      color: black;
    }

    #countdown {
      font-size: 60px;
      font-weight: 900;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      color: #9aa0a6;
      min-height: 20px;
    }

    .match {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: none;
    }

    .players {
      margin-top: 10px;
      color: #9aa0a6;
      font-size: 14px;
    }

    input[type="file"] {
      margin-top: 15px;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div class="players" id="players">Active Players: 0</div>

  <div class="card">
    <div>Your Rating</div>
    <div class="rating" id="rating">1000</div>
  </div>

  <button class="button" onclick="findMatch()">FIND MATCH</button>

  <input type="file" accept="image/*" capture="user" id="camera">

  <div class="status" id="status"></div>

  <div id="countdown"></div>

  <div class="match" id="matchBox">
    <div id="matchText"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = "p_" + Math.random().toString(36).substr(2, 9);
let rating = 1000;
let imageData = null;

/* ONLINE SYSTEM */
db.ref("online/" + playerId).set({ time: Date.now() });
db.ref("online/" + playerId).onDisconnect().remove();

db.ref("online").on("value", snap => {
  let data = snap.val();
  let count = data ? Object.keys(data).length : 0;
  document.getElementById("players").innerText = "Active Players: " + count;
});

/* CAMERA */
document.getElementById("camera").addEventListener("change", e => {
  let file = e.target.files[0];
  if (!file) return;

  let reader = new FileReader();
  reader.onload = function(event) {
    imageData = event.target.result;

    db.ref("online/" + playerId).update({
      image: imageData
    });

    document.getElementById("status").innerText = "Camera loaded!";
  };
  reader.readAsDataURL(file);
});

/* MATCHMAKING */
function findMatch() {

  document.getElementById("status").innerText = "Searching...";
  document.getElementById("matchBox").style.display = "none";
  document.getElementById("countdown").innerText = "";

  db.ref("queue/" + playerId).set({
    rating: rating,
    time: Date.now()
  });

  db.ref("queue/" + playerId).onDisconnect().remove();

  db.ref("matches").on("value", snap => {
    let data = snap.val();
    if (!data) return;

    for (let id in data) {
      let m = data[id];

      if (m.p1 === playerId || m.p2 === playerId) {
        countdown(m);
      }
    }
  });
}

/* COUNTDOWN */
let running = false;

function countdown(match) {
  if (running) return;
  running = true;

  let c = 3;
  document.getElementById("status").innerText = "Match found!";

  let t = setInterval(() => {

    document.getElementById("countdown").innerText = c;

    c--;

    if (c < 0) {
      clearInterval(t);
      startMatch(match);
    }

  }, 1000);
}

/* MATCH */
function startMatch(match) {

  let youAura = imageData ? Math.floor(Math.random()*40 + 60) : Math.floor(Math.random()*100);
  let oppAura = Math.floor(Math.random()*100);

  let win = youAura >= oppAura;

  rating += win ? 25 : -15;
  if (rating < 100) rating = 100;

  document.getElementById("rating").innerText = rating;

  document.getElementById("matchBox").style.display = "block";

  document.getElementById("matchText").innerHTML =
    "You Aura: " + youAura +
    "<br>Opponent Aura: " + oppAura +
    "<br><br>" + (win ? "YOU WON" : "YOU LOST");

  document.getElementById("countdown").innerText = "";
  document.getElementById("status").innerText = "";

  running = false;
}
</script>

</body>
</html>
