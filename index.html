<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoogle</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
    }

    .card {
      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
    }

    .rating {
      font-size: 40px;
      font-weight: 900;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 16px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      background: #00ff88;
      color: black;
    }

    video {
      width: 100%;
      margin-top: 15px;
      border-radius: 14px;
      display: none;
    }

    #countdown {
      font-size: 60px;
      font-weight: 900;
      margin-top: 10px;
    }

    .match {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: none;
    }

    .players {
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">OMOOGLE</div>

  <div class="players" id="players">Active Players: 0</div>

  <div class="card">
    <div>Your Rating</div>
    <div class="rating" id="rating">1000</div>
  </div>

  <button onclick="startCamera()">START CAMERA</button>
  <video id="video" autoplay playsinline></video>

  <button onclick="findMatch()">FIND MATCH</button>

  <div id="countdown"></div>

  <div class="match" id="matchBox">
    <div id="matchText"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgJSJYCqQXzDhs7_VOWz13sobzoYNL7ao",
  authDomain: "omoogle-d0faa.firebaseapp.com",
  projectId: "omoogle-d0faa",
  storageBucket: "omoogle-d0faa.appspot.com",
  messagingSenderId: "291641969937",
  appId: "1:291641969937:web:b01f5c40857a3980da90b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = "p_" + Math.random().toString(36).substr(2, 9);
let rating = 1000;
let streamActive = false;

/* ACTIVE PLAYERS */
db.ref("online/" + playerId).set({time:Date.now()});
db.ref("online/" + playerId).onDisconnect().remove();

db.ref("online").on("value", snap => {
  let d = snap.val();
  document.getElementById("players").innerText =
    "Active Players: " + (d ? Object.keys(d).length : 0);
});

/* 📹 LIVE CAMERA */
async function startCamera() {
  let video = document.getElementById("video");

  try {
    let stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;
    video.style.display = "block";

    streamActive = true;

  } catch (e) {
    alert("Camera permission denied");
  }
}

/* MATCHMAKING (simple working version) */
function findMatch() {

  db.ref("queue/" + playerId).set({
    rating: rating,
    time: Date.now()
  });

  db.ref("queue/" + playerId).onDisconnect().remove();

  matchmaker();
}

function matchmaker() {
  db.ref("queue").once("value", snap => {
    let q = snap.val();
    if (!q) return;

    let players = Object.keys(q);

    if (players.length < 2) return;

    let p1 = players[0];
    let p2 = players[1];

    let matchId = "m_" + Date.now();

    db.ref("matches/" + matchId).set({p1, p2});

    db.ref("queue/" + p1).remove();
    db.ref("queue/" + p2).remove();
  });

  listen();
}

/* LISTEN */
function listen() {
  db.ref("matches").on("value", snap => {
    let data = snap.val();
    if (!data) return;

    for (let id in data) {
      let m = data[id];

      if (m.p1 === playerId || m.p2 === playerId) {
        countdown(m);
      }
    }
  });
}

/* COUNTDOWN */
function countdown(match) {
  let c = 3;

  let t = setInterval(() => {
    document.getElementById("countdown").innerText = c;
    c--;

    if (c < 0) {
      clearInterval(t);
      startMatch(match);
    }
  }, 1000);
}

/* MATCH */
function startMatch(match) {

  let youAura = streamActive ? Math.floor(Math.random()*40+60) : Math.floor(Math.random()*100);
  let oppAura = Math.floor(Math.random()*100);

  let win = youAura >= oppAura;

  rating += win ? 25 : -15;

  document.getElementById("rating").innerText = rating;

  document.getElementById("matchBox").style.display = "block";

  document.getElementById("matchText").innerHTML =
    "You Aura: " + youAura +
    "<br>Opponent Aura: " + oppAura +
    "<br><br>" + (win ? "YOU WON" : "YOU LOST");
}
</script>

</body>
</html>
